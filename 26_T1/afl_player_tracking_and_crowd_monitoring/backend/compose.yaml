services:

  gateway:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://orion_user:orion_password@db:5432/orion_db
      PLAYER_SERVICE_URL: http://player-service:8001
      CROWD_SERVICE_URL: http://crowd-service:8002
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 60
      USE_MOCK_PLAYER: ${USE_MOCK_PLAYER:-true}
      USE_MOCK_CROWD: ${USE_MOCK_CROWD:-false}
      UPLOAD_DIR: /app/uploads
      LOG_LEVEL: INFO
      DEBUG: "false"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: orion_user
      POSTGRES_PASSWORD: orion_password
      POSTGRES_DB: orion_db
    volumes:
      - db_data:/var/lib/postgresql/data
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion_user -d orion_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # player-service:              -- uncomment when player team provides their Dockerfile
  #   build:
  #     context: ../player_tracking_logic
  #   ports:
  #     - "8001:8001"
  #   volumes:
  #     - uploads:/app/uploads

  # crowd-service:               -- uncomment when crowd team provides their Dockerfile
  #   build:
  #     context: ../Crowd_Monitoring/2026_T1
  #   ports:
  #     - "8002:8002"
  #   volumes:
  #     - uploads:/app/uploads

volumes:
  db_data:
  uploads:
